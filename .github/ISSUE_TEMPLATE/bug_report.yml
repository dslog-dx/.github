name: 🐛 バグ報告
description: 問題の報告（コンパクト版）
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます。迅速な修正のため、簡潔にご記入ください。

  - type: textarea
    id: description
    attributes:
      label: バグの説明と期待する挙動
      description: 何が起きて、本来どうなってほしかったかを簡潔に。
      placeholder: 例：ログインボタンを押すとエラー404が出て、マイページに進めない。
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 再現手順
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 利用環境・バージョン
      placeholder: iOS 17 (iPhone 15), v1.0.2 など
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 画像・動画
      description: ドラッグ&ドロップで貼り付けられます。
    validations:
      required: false

  - type: textarea
    id: logs_and_notes
    attributes:
      label: 備考・ログ・解決案
      description: エラーログや、「ここが原因かも？」と思う点があれば記入してください。
    validations:
      required: false
