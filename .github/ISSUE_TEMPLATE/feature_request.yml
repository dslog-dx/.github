name: ✨ 機能・改善要望
description: 新機能の提案や既存機能の改善案
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        新機能のアイデアや改善の提案ありがとうございます！
        チームで検討するため、以下の情報を教えてください。

  - type: textarea
    id: problem
    attributes:
      label: 背景・現状の課題
      description: なぜこの機能が必要だと思いましたか？今困っていることや、もっとこうなれば良いと思う点を教えてください。
      placeholder: 例：現在のログ一覧では特定の日付を探すのに時間がかかるため、フィルター機能が欲しい。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 理想の動作・解決案
      description: 具体的にどのような機能や挙動を期待していますか？
      placeholder: 例：画面右上にカレンダーアイコンを追加し、日付を選択できるようにしたい。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案（もしあれば）
      description: 他に検討した方法や、現在はどのように対応しているかなど。
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: 備考
      description: 参考にしている他社アプリの挙動や、手書きのラフ案などがあれば。
    validations:
      required: false
