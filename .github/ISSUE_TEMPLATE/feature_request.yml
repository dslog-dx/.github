name: ✨ 機能追加・改善
description: 運用中のシステムへの変更依頼
labels: ["enhancement"]
body:
  - type: textarea
    id: current_status
    attributes:
      label: 現状
      description: 今はどうなっているか、どこの箇所の話かを簡潔に。
      placeholder: 例：設定画面のログアウトボタンが一番下に配置されている。
    validations:
      required: true

  - type: textarea
    id: request_detail
    attributes:
      label: 変更・追加したい内容
      description: 具体的にどう変えたいか。
      placeholder: 例：誤操作を防ぐために、ボタンの色を赤色に変更し、確認ダイアログを出したい。
    validations:
      required: true

  - type: textarea
    id: priority_reason
    attributes:
      label: 理由・優先度
      description: なぜ今これが必要か（ユーザー要望、不便、など）。
      placeholder: 例：誤ってログアウトしてしまうという声が社内で多いため。
    validations:
      required: false

  - type: textarea
    id: reference
    attributes:
      label: 参考（画像やリンク）
      description: 関連するNotionのメモや、Figma、手書きのキャプチャなど。
    validations:
      required: false
