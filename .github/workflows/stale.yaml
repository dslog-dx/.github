name: "Close stale issues and PRs"

on:
  schedule:
    - cron: "0 0 * * *" # 毎日、深夜（UTC）に実行

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          # --- 設定項目 ---
          
          # 60日間動きがないIssueに「stale」ラベルを付与
          days-before-stale: 60
          
          # 「stale」ラベルが付いてから7日後に自動クローズ
          days-before-close: 7
          
          # 自動付与するラベル名
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          
          # stale（放置）と判定された時に投稿されるメッセージ
          stale-issue-message: "このIssueは長期間動きがないため、自動的に「停滞（stale）」としてマークされました。引き続き対応が必要な場合はコメントをお願いします。"
          stale-pr-message: "このPRは長期間動きがないため、自動的に「停滞（stale）」としてマークされました。最新の状態に更新するかコメントをお願いします。"
          
          # クローズされる時に投稿されるメッセージ
          close-issue-message: "一定期間動きがなかったため、このIssueを自動的にクローズします。"
          close-pr-message: "一定期間動きがなかったため、このPRを自動的にクローズします。"
          
          # このラベルが付いているものは放置されていてもクローズしない（安全策）
          exempt-issue-labels: "pinned,security,important"
          exempt-pr-labels: "pinned,important"
